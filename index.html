<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Sky</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a3d8f4;
            --pixel-border: #555;
            --white: #ffffff;
        }

        body {
            background-color: var(--sky-blue);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* Pixel Cat Background elements */
        .cat-deco {
            position: absolute;
            font-size: 40px;
            opacity: 0.6;
        }

        .container {
            background: white;
            border: 4px solid var(--pixel-border);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            padding: 30px;
            text-align: center;
            width: 320px;
            position: relative;
        }

        h1 { font-size: 2.5rem; margin-top: 0; color: #4a90e2; }
        
        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
            color: #d14d72;
        }

        input[type="text"] {
            border: 3px solid var(--pixel-border);
            padding: 10px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            width: 80%;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            background: #fff;
            border: 3px solid var(--pixel-border);
            padding: 5px 15px;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 5px;
            border-radius: 10px; /* Rounded corners as requested */
        }

        button:active { transform: translateY(4px); }
        button:hover { background: #f0f0f0; }

        .hidden { display: none; }

        /* Postcard Style */
        #postcard {
            background: #fff;
            border: 2px solid #ddd;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 400px;
            line-height: 1.6;
            text-align: left;
            position: relative;
        }
        
        #postcard::after {
            content: "🐱";
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <div class="cat-deco" style="bottom:10%; right:10%;">🐾</div>
