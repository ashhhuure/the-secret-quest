<!DOCTYPE html>
<html>
<head>
    <title>A Special Message</title>
    <style>
        /* This makes the page look pretty */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #fff0f5; /* Light blush pink */
            color: #333;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 400px;
        }
        button#heartBtn {
            font-size: 60px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.2s;
        }
        button#heartBtn:active { transform: scale(0.8); }
        #unlockBtn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Challenge!</h1>
        <p>Complete the mini-game to unlock my secret message.</p>

        <div id="game-container" style="border: 2px dashed #ffb6c1; padding: 20px; margin-bottom: 20px; border-radius: 15px;">
            <h3>Game 1: The Heart Collector</h3>
            <p>Tap the heart 10 times!</p>
            <button id="heartBtn">❤️</button>
            <p id="counterDisplay">Clicks: 0</p>
            <p id="passwordHint" style="display: none; color: #d63384; font-weight: bold;">
                The password is: <span style="background: #eee; padding: 2px 5px;">Forever</span>
            </p>
        </div>

        <input type="text" id="passwordInput" placeholder="Enter Password" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button id="unlockBtn" onclick="checkPassword()">Unlock</button>
    </div>

    <script>
        let clicks = 0;
        const btn = document.getElementById('heartBtn');
        const display = document.getElementById('counterDisplay');
        const hint = document.getElementById('passwordHint');

        btn.onclick = function() {
            clicks++;
            display.innerText = "Clicks: " + clicks;
            if (clicks >= 10) {
                hint.style.display = "block";
                btn.style.display = "none";
            }
        };

        function checkPassword() {
            const pw = document.getElementById('passwordInput').value;
            // This is where you write your confession!
            if(pw.toLowerCase() === "forever") {
                alert("Correct! My confession: [Insert your heartfelt message here! I've liked you for a long time...]");
            } else {
                alert("Wrong password! Try the game first.");
            }
        }
    </script>
</body>
</html>
