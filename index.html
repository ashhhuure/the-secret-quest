<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Quest</title>
    <style>
        :root { --pink: #fff0f5; --red: #e74c3c; --dark-red: #c0392b; --text: #333; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--pink); text-align: center; padding: 20px; color: var(--text); }
        .game-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 90%; min-width: 320px; margin-top: 20px; border: 2px solid #ccc;}
        .hidden { display: none; }
        button { background: var(--red); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 1.1em; transition: 0.2s;}
        button:hover { background: var(--dark-red); }

        /* --- THE NONOGRAM FIX (Styled after Reference Image) --- */
        .nonogram-container { position: relative; display: inline-block; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 40px); gap: 0px; border: 3px solid #000; justify-content: center; }
        .cell { width: 40px; height: 40px; border: 1px solid #000; background: #fff; cursor: pointer; box-sizing: border-box;}
        .cell.filled { background: var(--red); border: 1px solid var(--red); }
        
        .hint-row-fix { display: grid; grid-template-columns: repeat(5, 40px); gap: 0px; justify-content: center; border-left: 3px solid #000; border-right: 3px solid #000; border-top: 3px solid #000; box-sizing: border-box;}
        .row-hint { padding: 5px; font-weight: bold; font-size: 18px; border: 1px solid #000; }

        .hint-col-fix { position: absolute; top: 31px; left: -43px; display: flex; flex-direction: column; }
        .col-hint { width: 40px; height: 40px; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #000; border-top: 3px solid #000; border-bottom: 3px solid #000; }

        /* --- STAGE 2 DINO GAME STYLES --- */
        #gameCanvas { background: #fff; border-bottom: 2px solid #000; display: block; margin: 0 auto; border-radius: 10px; border: 1px solid #ccc;}
