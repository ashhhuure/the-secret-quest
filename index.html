<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Sky</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a3d8f4;
            --pixel-border: #000000;
        }

        body {
            background-color: var(--sky-blue);
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* The layer that gets dimmed */
        #ui-layer {
            transition: filter 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0; left: 0;
            z-index: 5;
        }

        .dimmed { filter: brightness(30%); pointer-events: none; }

        .cat-deco { position: absolute; font-size: 50px; z-index: 1; user-select: none; }

        .container {
            background: white;
            border: 6px solid var(--pixel-border);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            width: 380px;
            position: relative;
            z-index: 10;
        }

        h1 { font-size: 1.8rem; margin-top: 0; color: #4a90e2; text-transform: uppercase; }
        .score { position: absolute; top: 10px; right: 10px; font-size: 1rem; color: #d14d72; }

        input[type="text"] {
            border: 4px solid var(--pixel-border);
            padding: 10px;
            font-family: inherit;
            font-size: 1.2rem;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }

        button {
            background: #fff;
            border: 4px solid var(--pixel-border);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
            border-radius: 15px;
            transition: 0.1s;
        }

        button:hover { background: #e0f4ff; }
        .hidden { display: none !important; }

        /* POPUP STYLES */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .popup-container {
            background: white;
            border: 8px double var(--pixel-border);
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            width: 400px;
            padding: 20px 30px 40px 30px;
            text-align: center;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .popup-overlay.active .popup-container { transform: scale(1); opacity: 1; }

        .popup-lace {
            position: absolute;
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #ffcccc;
            width: 100%;
            left: 0;
            user-select: none;
        }
        .popup-lace.top { top: -12px; }
        .popup-lace.bottom { bottom: -12px; }

        .popup-deco { position: absolute; font-size: 40px; z-index: 100; }
        .popup-deco.cats-tr { top: 5px; right: 10px; }
        .popup-deco.cake-bl { bottom: -10px; left: 10px; }

        /* POSTCARD STYLE */
        #postcard-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        #postcard {
            background: #fff;
            border: 1px solid #ddd;
            padding: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            line-height: 1.8;
            text-align: left;
            position: relative;
        }
        #postcard p { margin-bottom: 20px; font-size: 1rem; color: #333; }
    </style>
</head>
<body>

    <audio id="confession-audio" src="music.mp3" loop></audio>
